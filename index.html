  <div class="video-modal" id="videoModal"></div>

  <script>
    // LOGIKA NAVBAR
    const menuBtn = document.getElementById('menuBtn');
    const dropdownMenu = document.getElementById('dropdownMenu');
    const logo1 = document.getElementById('logo1');
    const logo2 = document.getElementById('idLogo2');

    menuBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      dropdownMenu.classList.toggle('active');
      menuBtn.classList.toggle('active-btn');
    });

    document.addEventListener('click', () => {
      dropdownMenu.classList.remove('active');
      menuBtn.classList.remove('active-btn');
    });

    setTimeout(() => {
      logo1.classList.remove('intro-logo1');
      logo2.classList.remove('intro-logo2');
      void logo1.offsetWidth;
      void logo2.offsetWidth;
      logo1.classList.add('loop-logo1');
      logo2.classList.add('loop-logo2');
    }, 5000);

    // ==========================================
    // LOGIKA SEARCH & POP-UP VIDEO DENGAN FETCH DARI POPUP.HTML
    // ==========================================
    const searchInput = document.getElementById('searchAnim');
    const cards = document.querySelectorAll('.anim-card');
    const videoModal = document.getElementById('videoModal');

    // 1. Fungsi Pencarian Real-time
    searchInput.addEventListener('input', (e) => {
      const filterTeks = e.target.value.toLowerCase();
      cards.forEach(card => {
        const title = card.getAttribute('data-title').toLowerCase();
        if (title.includes(filterTeks)) {
          card.style.display = 'flex';
        } else {
          card.style.display = 'none';
        }
      });
    });

    // 2. Fungsi Load Pop-up Player Secara Dinamis saat Card Diklik
    cards.forEach(card => {
      card.addEventListener('click', () => {
        const vSrc = card.getAttribute('data-video');
        const vTitle = card.getAttribute('data-title');
        const vDesc = card.getAttribute('data-desc');

        // Ambil struktur komponen dari popup.html
        fetch('popup.html')
          .then(response => {
            if (!response.ok) throw new Error('Gagal memuat popup player');
            return response.text();
          })
          .then(htmlKonten => {
            // Masukkan struktur HTML ke dalam modal kontainer
            videoModal.innerHTML = htmlKonten;

            // Ambil elemen yang baru saja di-render didalam modal
            const player = document.getElementById('player');
            const modalTitle = document.getElementById('modalTitle');
            const modalDesc = document.getElementById('modalDesc');
            const closeModalBtn = document.getElementById('closeModalBtn');

            // Set isi konten sesuai data card yang diklik
            player.src = vSrc;
            modalTitle.textContent = vTitle;
            modalDesc.textContent = vDesc;
            
            // Tampilkan modal dan mainkan videonya
            videoModal.classList.add('show');
            player.play();

            // Setup fungsi tombol close bawaan modal
            const tutupModal = () => {
              videoModal.classList.remove('show');
              player.pause();
              videoModal.innerHTML = ""; // Bersihkan memori agar player mati total
            };

            closeModalBtn.addEventListener('click', tutupModal);
          })
          .catch(err => console.log("Info Player Error:", err.message));
      });
    });

    // Close modal jika area luar transparan diklik
    videoModal.addEventListener('click', (e) => {
      if (e.target === videoModal) {
        videoModal.classList.remove('show');
        const player = document.getElementById('player');
        if (player) player.pause();
        videoModal.innerHTML = "";
      }
    });
  </script>
