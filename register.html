<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@800;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; background: transparent;
            font-family: 'JetBrains Mono', monospace;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }
        .modal-box {
            background-color: #111;
            border: 2px solid #33ff33;
            padding: 30px 25px;
            border-radius: 16px;
            width: 90%;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 0 20px rgba(51, 255, 51, 0.2);
            color: white;
        }
        h3 {
            color: #33ff33; margin-top: 0; margin-bottom: 10px; font-size: 1.2rem;
        }
        p {
            font-size: 0.8rem; color: #aaa; margin-bottom: 20px; line-height: 1.4;
        }
        .input-dana {
            width: 100%; padding: 12px; background-color: #222;
            border: 1px solid #33ff33; border-radius: 8px;
            color: #fff; font-size: 1rem; font-family: 'JetBrains Mono', monospace;
            text-align: center; outline: none; margin-bottom: 20px;
            box-sizing: border-box;
        }
        .btn-submit {
            width: 100%; padding: 12px; background: #33ff33;
            border: none; border-radius: 8px; color: #000;
            font-weight: bold; font-size: 1rem; font-family: 'JetBrains Mono', monospace;
            cursor: pointer; transition: all 0.3s;
        }
        .btn-submit:hover {
            box-shadow: 0 0 15px rgba(51, 255, 51, 0.6);
        }
    </style>
</head>
<body>

    <div class="modal-box">
        <h3>Registrasi No Rekening</h3>
        <p>Masukkan nomor tujuan Anda terlebih dahulu sebelum memulai sistem.</p>
        <input type="number" class="input-dana" id="noDanaInput" placeholder="Contoh: 08815875598" required>
        <button class="btn-submit" id="btnDaftar">Selesai & Lanjutkan</button>
    </div>

    <script>
        document.getElementById('btnDaftar').addEventListener('click', () => {
            const noDana = document.getElementById('noDanaInput').value;

            if (noDana.trim() === "") {
                alert("Nomor tidak boleh kosong, bro!");
                return;
            }

            // Simpan nomor ke memori browser induk
            localStorage.setItem('danaUser', noDana);

            // Perintah khusus untuk menyuruh file index1.html menutup popup & mulai animasi
            window.parent.tutupPopupDanMulaiTeks();
        });
    </script>

</body>
</html>
