<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght=800;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; background: transparent;
            font-family: 'JetBrains Mono', monospace;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }
        
        .modal-box {
            position: relative;
            background-color: #111;
            padding: 30px 25px;
            border-radius: 16px;
            width: 90%;
            max-width: 360px;
            text-align: center;
            color: white;
            box-sizing: border-box;
            
            border: 3px solid transparent;
            background-image: linear-gradient(#111, #111), 
                              linear-gradient(var(--sudut-pelangi, 0deg), #ff3333, #ffff33, #33ff33, #33ffff, #3333ff, #ff33ff);
            background-origin: border-box;
            background-clip: padding-box, border-box;
            
            animation: efekGlowPelangi 4s linear infinite;
        }

        @property --sudut-pelangi {
            syntax: '<angle>';
            inherits: false;
            initial-value: 0deg;
        }

        @keyframes efekGlowPelangi {
            0% { --sudut-pelangi: 0deg; box-shadow: 0 0 15px rgba(255, 51, 51, 0.5); }
            50% { --sudut-pelangi: 180deg; box-shadow: 0 0 15px rgba(51, 255, 255, 0.5); }
            100% { --sudut-pelangi: 360deg; box-shadow: 0 0 15px rgba(255, 51, 51, 0.5); }
        }

        h3 {
            color: #33ff33; margin-top: 0; margin-bottom: 10px; font-size: 1.2rem;
            text-shadow: 0 0 10px rgba(51, 255, 51, 0.3);
        }
        p {
            font-size: 0.8rem; color: #aaa; margin-bottom: 20px; line-height: 1.4;
        }
        .input-dana {
            width: 100%; padding: 12px; background-color: #222;
            border: 1px solid #33ff33; border-radius: 8px;
            color: #fff; font-size: 1rem; font-family: 'JetBrains Mono', monospace;
            text-align: center; outline: none; margin-bottom: 15px;
            box-sizing: border-box;
        }
        .input-dana::-webkit-outer-spin-button,
        .input-dana::-webkit-inner-spin-button {
            -webkit-appearance: none; margin: 0;
        }
        
        .error-container {
            min-height: 40px; margin-bottom: 15px; font-size: 0.8rem;
            color: #ff3333; font-weight: 900; display: flex;
            justify-content: center; align-items: center;
        }
        .kursor-error {
            display: inline-block; background-color: #33ff33; width: 8px; height: 1rem;
            animation: kedipError 0.6s infinite; vertical-align: middle;
        }
        @keyframes kedipError { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }

        .btn-submit {
            width: 100%; padding: 12px; background: #33ff33;
            border: none; border-radius: 8px; color: #000;
            font-weight: bold; font-size: 1rem; font-family: 'JetBrains Mono', monospace;
            cursor: pointer; transition: all 0.3s;
        }
        .btn-submit:hover { box-shadow: 0 0 15px rgba(51, 255, 51, 0.6); }

        #areaSalin {
            display: none;
        }
        .box-link {
            background-color: #222; border: 1px dashed #33ff33;
            padding: 12px; border-radius: 8px; font-size: 0.75rem;
            word-break: break-all; color: #00ffcc; margin-bottom: 20px;
            user-select: all; text-align: left; line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="modal-box">
        <div id="formInputUtama">
            <h3>Registrasi No Rekening</h3>
            <p>Masukkan nomor tujuan Anda terlebih dahulu sebelum memulai sistem.</p>
            
            <input type="tel" class="input-dana" id="noDanaInput" placeholder="Mesti diawali 08..." maxlength="13" required>
            <input type="text" class="input-dana" id="dataInput" placeholder="Masukkan data di sini..." required>
            
            <div class="error-container">
                <span id="log-error"></span><span class="kursor-error" id="kursor-err"></span>
            </div>

            <button class="btn-submit" id="btnDaftar">Selesai & Lanjutkan</button>
        </div>

        <div id="areaSalin">
            <h3>Salin Link Manual</h3>
            <p>Data berhasil diverifikasi. Silakan salin tautan di bawah ini secara manual untuk melanjutkan akses.</p>
            
            <div class="box-link" id="teksLinkHasil">Menyiapkan tautan...</div>
            
            <button class="btn-submit" id="btnSalinTeks">Salin Tautan 📋</button>
        </div>
    </div>

    <script>
        const wadahError = document.getElementById("log-error");
        const kursorErr = document.getElementById("kursor-err");
        
        let hurufIndex = 0;
        let keurNgetik = false; 
        let teksAktif = ""; 

        function ketikError() {
            if (hurufIndex < teksAktif.length) {
                wadahError.textContent += teksAktif[hurufIndex];
                hurufIndex++;
                setTimeout(ketikError, 40); 
            } else {
                keurNgetik = false;
            }
        }

        document.getElementById('btnDaftar').addEventListener('click', () => {
            if (keurNgetik) return;

            const noDana = document.getElementById('noDanaInput').value.trim();
            const polaValidasi = /^08[0-9]{8,11}$/;
            const data = document.getElementById('dataInput').value.trim();
            
            // PERUBAHAN DI SINI: Kode [0-9]{24}$ memastikan harus ada tepat 24 nomor di ekor URL
            const polaVlidasi = /^https:\/\/link\.dana\.id\/minta\?full_url=https:\/\/qr\.dana\.id\/v1\/[0-9]{24}$/;

            if (noDana === "") {
                wadahError.textContent = ""; hurufIndex = 0; keurNgetik = true;
                teksAktif = "Isi Nomor Terlebih Dahulu ⚠️"; ketikError(); return;
            }
            if (!noDana.startsWith("08")) {
                wadahError.textContent = ""; hurufIndex = 0; keurNgetik = true;
                teksAktif = "Dimohon untuk mengawali dengan 08xxxxxxxxx ⚠️"; ketikError(); return;
            }
            if (!polaValidasi.test(noDana)) {
                wadahError.textContent = ""; hurufIndex = 0; keurNgetik = true;
                teksAktif = "Sayang Nya Lu Pake Nomor Ngasal 😔"; ketikError(); return;
            }
            if (data === "") {
                wadahError.textContent = ""; hurufIndex = 0; keurNgetik = true;
                teksAktif = "Isi Link Terlebih Dahulu ⚠️"; ketikError(); return;
            }
            if (!polaVlidasi.test(data)) {
                wadahError.textContent = ""; hurufIndex = 0; keurNgetik = true;
                teksAktif = "Format Link DANA Salah atau Tidak Valid! ❌"; ketikError(); return;
            }

            // SIMPAN DATA KE LOCAL STORAGE
            localStorage.setItem('danaUser', noDana);
            localStorage.setItem('linkUser', data);
            
            // Generate url tautan kustom menuju halaman index utama (index.html)
            const domainAsli = window.location.origin + window.location.pathname.replace('register.html', '');
            const linkHasilGenerate = `${domainAsli}index.html`;
            
            document.getElementById('teksLinkHasil').textContent = linkHasilGenerate;

            // Berpindah tampilan ke area salin link
            document.getElementById('formInputUtama').style.display = 'none';
            document.getElementById('areaSalin').style.display = 'block';
        });

        document.getElementById('btnSalinTeks').addEventListener('click', () => {
            const teksLink = document.getElementById('teksLinkHasil').textContent;
            
            navigator.clipboard.writeText(teksLink).then(() => {
                alert("Tautan sukses disalin! Silakan tempel secara manual di browser Anda. 👍");
            }).catch(err => {
                alert("Gagal menyalin otomatis. Silakan blok dan salin teks di atas secara manual.");
            });
        });

        document.getElementById('noDanaInput').addEventListener('input', function (e) {
            this.value = this.value.replace(/[^0-9]/g, '');
        });
    </script>
</body>
</html>
