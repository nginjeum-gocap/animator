<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght=800;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; background: transparent;
            font-family: 'JetBrains Mono', monospace;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }
        .modal-box {
            background-color: #111;
            border: 2px solid #33ff33;
            padding: 30px 25px;
            border-radius: 16px;
            width: 90%;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 0 20px rgba(51, 255, 51, 0.2);
            color: white;
        }
        h3 {
            color: #33ff33; margin-top: 0; margin-bottom: 10px; font-size: 1.2rem;
        }
        p {
            font-size: 0.8rem; color: #aaa; margin-bottom: 20px; line-height: 1.4;
        }
        .input-dana {
            width: 100%; padding: 12px; background-color: #222;
            border: 1px solid #33ff33; border-radius: 8px;
            color: #fff; font-size: 1rem; font-family: 'JetBrains Mono', monospace;
            text-align: center; outline: none; margin-bottom: 15px;
            box-sizing: border-box;
        }
        .input-dana::-webkit-outer-spin-button,
        .input-dana::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        
        /* WADAH PESAN ERROR DAN ANIMASI KETIK */
        .error-container {
            min-height: 40px; /* Ditambah sedikit biar teks panjang gak memotong layout */
            margin-bottom: 15px;
            font-size: 0.8rem;
            color: #ff3333;
            font-weight: 900;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            line-height: 1.3;
        }
        .kursor-error {
            display: inline-block;
            background-color: #33ff33;
            width: 8px;
            height: 1rem;
            margin-left: 2px;
            animation: kedipError 0.6s infinite;
            vertical-align: middle;
        }
        @keyframes kedipError {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }

        .btn-submit {
            width: 100%; padding: 12px; background: #33ff33;
            border: none; border-radius: 8px; color: #000;
            font-weight: bold; font-size: 1rem; font-family: 'JetBrains Mono', monospace;
            cursor: pointer; transition: all 0.3s;
        }
        .btn-submit:hover {
            box-shadow: 0 0 15px rgba(51, 255, 51, 0.6);
        }
    </style>
</head>
<body>

    <div class="modal-box">
        <h3>Registrasi No Rekening</h3>
        <p>Masukkan nomor tujuan Anda terlebih dahulu sebelum memulai sistem.</p>
        
        <input type="tel" class="input-dana" id="noDanaInput" placeholder="Mesti diawali 08..." maxlength="13" required>
        
        <div class="error-container">
            <span id="log-error"></span><span class="kursor-error" id="kursor-err"></span>
        </div>

        <button class="btn-submit" id="btnDaftar">Selesai & Lanjutkan</button>
    </div>

    <script>
        const wadahError = document.getElementById("log-error");
        const kursorErr = document.getElementById("kursor-err");
        
        let hurufIndex = 0;
        let keurNgetik = false; 
        let teksAktif = ""; 

        function ketikError() {
            if (hurufIndex < teksAktif.length) {
                wadahError.textContent += teksAktif[hurufIndex];
                hurufIndex++;
                setTimeout(ketikError, 40); // Kecepatan ngetik dibuat sedikit lebih cepat karena teks panjang
            } else {
                keurNgetik = false;
            }
        }

        document.getElementById('btnDaftar').addEventListener('click', () => {
            if (keurNgetik) return;

            const noDana = document.getElementById('noDanaInput').value.trim();
            const polaValidasi = /^08[0-9]{8,11}$/;

            // KONDISI 1: JIKA KOSONG
            if (noDana === "") {
                wadahError.textContent = "";
                hurufIndex = 0;
                keurNgetik = true;
                teksAktif = "Isi Nomor Terlebih Dahulu ⚠️";
                kursorErr.style.backgroundColor = "#ff3333";
                ketikError();
                return;
            }

            // KONDISI 2: JIKA TIDAK DIAWALI 08
            if (!noDana.startsWith("08")) {
                wadahError.textContent = "";
                hurufIndex = 0;
                keurNgetik = true;
                teksAktif = "Dimohon untuk mengawali dengan 08xxxxxxxxx ⚠️";
                kursorErr.style.backgroundColor = "#ff3333";
                ketikError();
                return;
            }

            // KONDISI 3: DIAWALI 08 TAPI FORMAT DIGITNYA SALAH / NGASAL (KEPENDEKAN ATAU KEPANJANGAN)
            if (!polaValidasi.test(noDana)) {
                wadahError.textContent = "";
                hurufIndex = 0;
                keurNgetik = true;
                teksAktif = "Sayang Nya Lu Pake Nomor Ngasal 😔";
                kursorErr.style.backgroundColor = "#ff3333";
                ketikError();
                return;
            }

            // JIKA LOLOS SEMUA VALIDASI
            localStorage.setItem('danaUser', noDana);
            window.parent.tutupPopupDanMulaiTeks();
        });

        // Blokir input non-angka secara real-time saat mengetik
        document.getElementById('noDanaInput').addEventListener('input', function (e) {
            this.value = this.value.replace(/[^0-9]/g, '');
        });
    </script>

</body>
</html>
