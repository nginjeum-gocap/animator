<!DOCTYPE html>
<html>
<head>
    <title>Transfer Gocap</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght=800;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: black;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.5rem;
            font-weight: 900; 
            overflow: hidden;
            margin: 0;
        }
        .container {
            text-align: left;
            width: 85%;
            max-width: 450px;
        }
        .teks-sukses {
            line-height: 1.5;
            color: #33ff33;
            font-weight: 900; 
        }
        .emoji-asli {
            -webkit-text-fill-color: initial !important;
        }
        .petunjuk-loading {
            font-size: 0.95rem; 
            color: #888;
            font-weight: 800;
            display: inline-block;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="teks-sukses">
            Madep! Ditunggu Transferna Ieu No Rek Na:<span id="no-rek-dinamis">08815875598</span>! <span class="emoji-asli">🙏😎</span>
            <br>
            <span class="petunjuk-loading">Membuka aplikasi DANA otomatis...</span>
        </div>
    </div>

    <script>
        // Sediakan variabel global untuk menampung link milik user
        let urlTujuan = "";

        window.onload = function() {
            // 1. Ambil data nomor dari register.html
            const nomorUser = localStorage.getItem('danaUser');
            
            // 2. DI SINI TARO SCRIPT-NYA: Ambil data link dari register.html
            const linkDiterima = localStorage.getItem('linkUser');
            
            // Jika data nomor ada, ubah teks di layar secara otomatis
            if (nomorUser) {
                document.getElementById('no-rek-dinamis').innerText = nomorUser;
            }

            // Jika data link dari user ada, masukkan ke variabel urlTujuan
            if (linkDiterima) {
                urlTujuan = linkDiterima;
            } else {
                // Link cadangan default jika seandainya localStorage kosong
                urlTujuan = "https://link.dana.id/minta?full_url=https://qr.dana.id/v1/281012092026061777500853";
            }

            // Jalankan pengalihan otomatis setelah 800ms
            setTimeout(function() {
                bukaDanaOtomatis();
            }, 800);
        };

        function bukaDanaOtomatis() {
            // Mengarah langsung ke link yang di-input oleh user secara dinamis
            window.location.href = urlTujuan;
            
            // Sistem cadangan jika deep link utama tersendat di browser Android tertentu
            setTimeout(function() {
                window.location.href = "intent://#Intent;scheme=dana;package=id.dana;end";
            }, 400);
        }
    </script>
</body>
</html>
