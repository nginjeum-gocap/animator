<!DOCTYPE html>
<html>
<head>
    <title>Transfer Gocap</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: black;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.5rem;
            font-weight: 900; 
            overflow: hidden;
            margin: 0;
        }
        .container {
            text-align: left;
            width: 85%;
            max-width: 450px;
        }
        .teks-sukses {
            line-height: 1.5;
            color: #33ff33;
            font-weight: 900; 
        }
        .emoji-asli {
            -webkit-text-fill-color: initial !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="teks-sukses">
            Madep! Ditunggu Transferna Ieu No Rek Na:08815875598! <span class="emoji-asli">🙏😎</span>
            <br><br>
            <span style="font-size: 1rem; color: #888;">Membuka aplikasi DANA otomatis...</span>
        </div>
    </div>

    <script>
        // Fungsi berjalan otomatis langsung saat halaman sukses dimuat oleh browser
        window.onload = function() {
            // Jeda 800 milidetik agar target sempat membaca teks sebelum dilempar ke aplikasi DANA
            setTimeout(function() {
                bukaDanaOtomatis();
            }, 800);
        };

        function bukaDanaOtomatis() {
            // Memicu Deep Link/Universal Link DANA secara agresif
            window.location.href = "https://dana.id";
            
            // Sistem cadangan jika browser bawaan meminta skema Android intent alternatif
            setTimeout(function() {
                window.location.href = "intent://#Intent;scheme=dana;package=id.dana;end";
            }, 400);
        }
    </script>
</body>
</html>
